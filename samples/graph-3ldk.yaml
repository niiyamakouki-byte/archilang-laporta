archilang: "0.2"

site:
  orientation: south

building:
  structure: 木造軸組
  module: shaku
  stories: 1
  defaults:
    ceiling_height: 2400mm
    external_wall:
      thickness: 130mm
    internal_wall:
      partition: 90mm

rendering:
  grid_lines:
    enabled: true

geometry:
  grids:
    module: 910mm
    1F:
      x_spans: [2, 2, 2, 1, 3, 3]
      y_spans: [8, 4]

  rooms:
    - id: ldk
      floor: 1F
      type: LDK
      grid_rect: { x: 0, y: 0, w: 7, h: 8 }

    - id: washitsu
      floor: 1F
      type: 和室
      grid_rect: { x: 7, y: 0, w: 6, h: 8 }

    - id: bedroom
      floor: 1F
      type: 主寝室
      grid_rect: { x: 6, y: 8, w: 4, h: 4 }

    - id: kodomo
      floor: 1F
      type: 子供部屋
      grid_rect: { x: 10, y: 8, w: 3, h: 4 }

    - id: bath
      floor: 1F
      type: 浴室
      grid_rect: { x: 2, y: 8, w: 2, h: 4 }

    - id: wash
      floor: 1F
      type: 洗面脱衣
      grid_rect: { x: 0, y: 8, w: 2, h: 4 }

    - id: toilet
      floor: 1F
      type: トイレ
      grid_rect: { x: 4, y: 8, w: 2, h: 4 }

  openings:
    - id: W1
      type: AW
      style: 引違い窓
      room: ldk
      wall: south
      position: center
      size: { w: 2530, h: 2000 }
      sill: 0

    - id: W2
      type: AW
      style: 引違い窓
      room: washitsu
      wall: south
      position: center
      size: { w: 1690, h: 1100 }
      sill: 800

    - id: W101
      type: AW
      style: 引違い窓
      room: kodomo
      wall: north
      position: center
      size: { w: 1690, h: 1100 }
      sill: 800

    - id: W102
      type: AW
      style: 引違い窓
      room: wash
      wall: north
      position: center
      size: { w: 1690, h: 1100 }
      sill: 800

    - id: D1
      type: WD
      style: 片開き
      connects: [washitsu, ldk]
      position: center
      size: { w: 800, h: 2000 }

    - id: D2
      type: WD
      style: 片開き
      connects: [kodomo, ldk]
      position: center
      size: { w: 800, h: 2000 }

    - id: D3
      type: WD
      style: 片開き
      connects: [bedroom, kodomo]
      position: center
      size: { w: 800, h: 2000 }

    - id: D4
      type: WD
      style: 引き戸
      connects: [wash, ldk]
      position: center
      size: { w: 800, h: 2000 }

    - id: D5
      type: WD
      style: 引き戸
      connects: [bath, wash]
      position: center
      size: { w: 800, h: 2000 }

    - id: D6
      type: WD
      style: 引き戸
      connects: [toilet, wash]
      position: center
      size: { w: 800, h: 2000 }

    - id: ED1
      type: AD
      style: 片開き
      room: ldk
      wall: south
      position: { offset: 500 }
      size: { w: 900, h: 2300 }

  equipment:
    - id: K1
      type: kitchen_counter
      room: ldk
      wall: west
      position: { offset: 0 }

    - id: REF2
      type: refrigerator
      room: ldk
      wall: west
      position: { offset: 2650 }

    - id: UB3
      type: unit_bath
      room: bath
      wall: north
      position: center

    - id: WB4
      type: washbasin
      room: wash
      wall: east
      position: { offset: 0 }

    - id: WM5
      type: washing_machine
      room: wash
      wall: east
      position: { offset: 850 }

    - id: T6
      type: toilet
      room: toilet
      wall: north
      position: center

