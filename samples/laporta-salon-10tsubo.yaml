# ラポルタ実案件想定: 美容サロン 10坪 (約33㎡) 路面店
# ヘアサロン: エントランス・受付 / カット席 / シャンプーコーナー / スタッフルーム / トイレ
# 仕上げ: 床=フロアタイル(カット席のみフローリング), 壁・天井=クロス, シャンプーコーナー=防水タイル

archilang: "0.2"

site:
  orientation: south   # 路面店=南面ファサード

building:
  structure: 鉄骨造
  module: shaku         # 910mm グリッド
  stories: 1
  defaults:
    ceiling_height: 2700mm
    external_wall:
      thickness: 150mm
    internal_wall:
      partition: 100mm

rendering:
  grid_lines:
    enabled: true
  area_table:
    enabled: true

geometry:
  grids:
    module: 910mm
    1F:
      x_spans: [4, 4]    # 8グリッド = 7280mm (約7.3m 間口)
      y_spans: [1, 3, 1]  # 5グリッド = 4550mm (約4.6m 奥行) → 合計約33㎡ (10坪)

  rooms:
    # 南面 前列 (y=0)
    - id: entrance_reception
      floor: 1F
      type: 玄関ホール      # エントランス+受付カウンター: 6グリッド = 約5.0㎡
      grid_rect: { x: 0, y: 0, w: 6, h: 1 }

    - id: toilet
      floor: 1F
      type: トイレ          # 客用トイレ: 2グリッド = 約1.7㎡
      grid_rect: { x: 6, y: 0, w: 2, h: 1 }

    # 中列 + 後列左 (y=1〜3)
    - id: cut_area
      floor: 1F
      type: LDK             # カット席エリア (3席想定): 15グリッド = 約12.4㎡
      grid_rect: { x: 0, y: 1, w: 5, h: 3 }

    # 中列右 (y=1〜2)
    - id: shampoo_corner
      floor: 1F
      type: 洗面脱衣         # シャンプー台コーナー (防水仕様): 6グリッド = 約5.0㎡
      grid_rect: { x: 5, y: 1, w: 3, h: 2 }

    # 後列右 (y=3)
    - id: staff_room
      floor: 1F
      type: 収納             # スタッフルーム: 3グリッド = 約2.5㎡
      grid_rect: { x: 5, y: 3, w: 3, h: 1 }

  openings:
    # ── 外部開口 ──

    # 路面ファサード 全面ガラス (南面: entrance_reception 西寄り大窓)
    - id: FW1
      type: AW
      style: 引違い窓
      room: entrance_reception
      wall: south
      position: center
      size: { w: 3640, h: 2200 }
      sill: 300

    # 店舗メイン自動ドア (南面: entrance_reception 中央)
    - id: ED1
      type: AD
      style: 片開き
      room: entrance_reception
      wall: south
      position: { offset: 910 }
      size: { w: 1000, h: 2200 }

    # スタッフ専用バックドア (北面: staff_room)
    - id: BD1
      type: WD
      style: 片開き
      room: staff_room
      wall: north
      position: center
      size: { w: 800, h: 2000 }

    # ── 内部建具 ──

    # エントランス ↔ カット席
    - id: D1
      type: WD
      style: 引き戸
      connects: [entrance_reception, cut_area]
      position: center
      size: { w: 1000, h: 2100 }

    # エントランス ↔ トイレ
    - id: D2
      type: WD
      style: 片開き
      connects: [entrance_reception, toilet]
      position: center
      size: { w: 700, h: 2000 }

    # カット席 ↔ シャンプーコーナー
    - id: D3
      type: WD
      style: 引き戸
      connects: [cut_area, shampoo_corner]
      position: center
      size: { w: 900, h: 2100 }

    # カット席 ↔ スタッフルーム
    - id: D4
      type: WD
      style: 片開き
      connects: [cut_area, staff_room]
      position: center
      size: { w: 800, h: 2000 }
